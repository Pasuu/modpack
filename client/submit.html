<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/img/logo.svg">
    <title>提交汉化包 - Modpack Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .submit-container {
            max-width: 800px;
            margin: 48px auto;
        }
        
        .submit-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        
        .submit-header {
            background: linear-gradient(135deg, var(--primary-bg), var(--bg-white));
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        
        .submit-header h1 {
            font-size: 28px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .submit-header p {
            color: var(--text-light);
        }
        
        .submit-form {
            padding: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }
        
        .form-group label .required {
            color: var(--warning);
            margin-left: 4px;
        }
        
        .form-group label .optional {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: normal;
            margin-left: 8px;
        }
        
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            transition: var(--transition);
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-bg);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        
        .tag-option {
            padding: 6px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-gray);
        }
        
        .tag-option:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .tag-option.selected {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        
        .file-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-light);
        }
        
        .file-upload-area:hover {
            border-color: var(--primary);
            background: var(--primary-bg);
        }
        
        .file-upload-area i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 16px;
        }
        
        .file-info {
            margin-top: 16px;
            padding: 12px 16px;
            background: var(--primary-bg);
            border-radius: var(--radius-md);
            display: none;
        }
        
        .file-info.show {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .upload-progress {
            margin-top: 16px;
            display: none;
        }
        
        .upload-progress.show {
            display: block;
        }
        
        .progress-bar-container {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s;
            border-radius: 4px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 16px;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 16px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            display: none;
        }
        
        .alert.show {
            display: block;
        }
        
        .alert-success {
            background: #d1fae5;
            border: 1px solid #10b981;
            color: #065f46;
        }
        
        .alert-error {
            background: #fee2e2;
            border: 1px solid #f87171;
            color: #991b1b;
        }
        
        .alert-info {
            background: var(--primary-bg);
            border: 1px solid var(--primary);
            color: var(--primary-dark);
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
            
            .submit-container {
                margin: 24px;
            }
            
            .submit-form {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-inner">
                <a href="/" class="logo">
                    <div class="logo-icon">MH</div>
                    <div class="logo-text">Modpack <span>Hub</span></div>
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link">首页</a>
                    <a href="/modpacks.html" class="nav-link">整合包</a>
                    <a href="/disclaimer.html" class="nav-link">免责声明</a>
                    <a href="/submit.html" class="nav-link active">提交汉化</a>
                    <a href="/my-submissions.html" class="nav-link">我的提交</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="submit-container">
            <div class="submit-card">
                <div class="submit-header">
                    <h1><i class="fas fa-cloud-upload-alt"></i> 提交汉化包</h1>
                    <p>分享您的汉化作品，让更多玩家受益</p>
                </div>
                
                <div id="alert" class="alert"></div>
                
                <form id="submitForm" class="submit-form">
                    <div class="form-group">
                        <label>整合包名称 <span class="required">*</span></label>
                        <input type="text" id="name" placeholder="例如: Create: Above and Beyond" required>
                    </div>
                    
                    <div class="form-group">
                        <label>原整合包名称 <span class="optional">(可选)</span></label>
                        <input type="text" id="originalName" placeholder="英文原名称">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>游戏版本 <span class="required">*</span></label>
                            <select id="gameVersion" required>
                                <option value="">请选择</option>
                                <option value="1.7.10-Forge">1.7.10-Forge</option>
                                <option value="1.10.2-Forge">1.10.2-Forge</option>
                                <option value="1.12.2-Forge">1.12.2-Forge</option>
                                <option value="1.15.2-Forge">1.15.2-Forge</option>
                                <option value="1.16.5-Forge">1.16.5-Forge</option>
                                <option value="1.18.2-Forge">1.18.2-Forge</option>
                                <option value="1.19.2-Forge">1.19.2-Forge</option>
                                <option value="1.20.1-Forge">1.20.1-Forge</option>
                                <option value="1.20.1-Fabric">1.20.1-Fabric</option>
                                <option value="1.20.4-NeoForge">1.20.4-NeoForge</option>
                                <option value="1.21.1-NeoForge">1.21.1-NeoForge</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>汉化版本 <span class="required">*</span></label>
                            <input type="text" id="i18nVersion" placeholder="例如: 1.0.0" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>汉化组/作者 <span class="required">*</span></label>
                            <input type="text" id="i18nTeam" placeholder="例如: CFPA-Team" required>
                        </div>
                        
                        <div class="form-group">
                            <label>您的名称 <span class="required">*</span></label>
                            <input type="text" id="authorName" placeholder="您的昵称" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>邮箱 <span class="optional">(用于接收审核通知)</span></label>
                            <input type="email" id="authorEmail" placeholder="your@email.com">
                        </div>
                        
                        <div class="form-group">
                            <label>联系方式 <span class="optional">(QQ/微信/Discord)</span></label>
                            <input type="text" id="authorDiscord" placeholder="联系方式">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>整合包描述 <span class="optional">(可选)</span></label>
                        <textarea id="description" placeholder="简要描述这个整合包的特点..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>标签 <span class="optional">(可多选)</span></label>
                        <div class="tags-container" id="tagsContainer">
                            <span class="tag-option" data-tag="冒险">冒险</span>
                            <span class="tag-option" data-tag="科技">科技</span>
                            <span class="tag-option" data-tag="魔法">魔法</span>
                            <span class="tag-option" data-tag="任务">任务</span>
                            <span class="tag-option" data-tag="硬核">硬核</span>
                            <span class="tag-option" data-tag="休闲">休闲</span>
                            <span class="tag-option" data-tag="空岛">空岛</span>
                            <span class="tag-option" data-tag="大型">大型</span>
                            <span class="tag-option" data-tag="轻量">轻量</span>
                            <span class="tag-option" data-tag="水槽">水槽</span>
                            <span class="tag-option" data-tag="地图">地图</span>
                            <span class="tag-option" data-tag="PvP">PvP</span>
                            <span class="tag-option" data-tag="国创">国创</span>
                            <span class="tag-option" data-tag="剧情">剧情</span>
                            <span class="tag-option" data-tag="建筑">建筑</span>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>图片URL <span class="optional">(可选)</span></label>
                        <input type="url" id="imageUrl" placeholder="https://...">
                    </div>
                    
                    <div class="form-group">
                        <label>相关链接 <span class="optional">(至少提供一个)</span></label>
                        <input type="url" id="curseforgeUrl" placeholder="CurseForge 链接" style="margin-bottom: 12px;">
                        <input type="url" id="modrinthUrl" placeholder="Modrinth 链接" style="margin-bottom: 12px;">
                        <input type="url" id="mcmodUrl" placeholder="MC百科 链接" style="margin-bottom: 12px;">
                        <input type="url" id="githubUrl" placeholder="GitHub 链接" style="margin-bottom: 12px;">
                        <input type="url" id="bilibiliUrl" placeholder="B站主页/视频链接" style="margin-bottom: 12px;">
                        <input type="url" id="otherUrl" placeholder="其他链接">
                    </div>
                    
                    <div class="form-group">
                        <label>汉化文件 <span class="required">*</span></label>
                        <div class="file-upload-area" id="fileDropArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>拖放文件到此处 或 点击选择</p>
                            <p style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">支持 .zip, .rar, .7z 格式，最大 50MB</p>
                            <input type="file" id="fileInput" accept=".zip,.rar,.7z" style="display: none;">
                        </div>
                        <div class="file-info" id="fileInfo">
                            <i class="fas fa-file-archive"></i>
                            <span id="fileName"></span>
                            <span id="fileSize" style="color: var(--text-muted);"></span>
                        </div>
                        <div class="upload-progress" id="uploadProgress">
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill" id="progressBarFill"></div>
                            </div>
                            <p style="font-size: 12px; margin-top: 8px;">上传中: <span id="progressPercent">0</span>%</p>
                        </div>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <i class="fas fa-paper-plane"></i> 提交汉化包
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/">首页</a>
                <a href="/modpacks.html">整合包</a>
                <a href="/disclaimer.html">免责声明</a>
                <a href="/submit.html">提交汉化</a>
                <a href="/my-submissions.html">我的提交</a>
            </div>
            <p>© 2026 Modpack Hub · Minecraft 整合包汉化社区</p>
        </div>
    </footer>

    <script>
        // 标签选择
        const selectedTags = new Set();
        
        document.querySelectorAll('.tag-option').forEach(tag => {
            tag.addEventListener('click', () => {
                const tagName = tag.dataset.tag;
                if (selectedTags.has(tagName)) {
                    selectedTags.delete(tagName);
                    tag.classList.remove('selected');
                } else {
                    selectedTags.add(tagName);
                    tag.classList.add('selected');
                }
            });
        });
        
        // 文件上传
        let selectedFile = null;
        let fileUploadedUrl = null;
        
        const fileDropArea = document.getElementById('fileDropArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameSpan = document.getElementById('fileName');
        const fileSizeSpan = document.getElementById('fileSize');
        const uploadProgressDiv = document.getElementById('uploadProgress');
        const progressBarFill = document.getElementById('progressBarFill');
        const progressPercent = document.getElementById('progressPercent');
        
        fileDropArea.addEventListener('click', () => fileInput.click());
        
        fileDropArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileDropArea.style.borderColor = 'var(--primary)';
            fileDropArea.style.background = 'var(--primary-bg)';
        });
        
        fileDropArea.addEventListener('dragleave', () => {
            fileDropArea.style.borderColor = 'var(--border)';
            fileDropArea.style.background = 'var(--bg-light)';
        });
        
        fileDropArea.addEventListener('drop', (e) => {
            e.preventDefault();
            fileDropArea.style.borderColor = 'var(--border)';
            fileDropArea.style.background = 'var(--bg-light)';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        async function handleFile(file) {
            const validExtensions = ['.zip', '.rar', '.7z'];
            const ext = '.' + file.name.split('.').pop().toLowerCase();
            
            if (!validExtensions.includes(ext)) {
                showAlert('不支持的文件类型！请上传 ZIP、RAR 或 7Z 格式', 'error');
                return;
            }
            
            if (file.size > 50 * 1024 * 1024) {
                showAlert('文件太大！最大支持 50MB', 'error');
                return;
            }
            
            selectedFile = file;
            fileNameSpan.textContent = file.name;
            fileSizeSpan.textContent = formatFileSize(file.size);
            fileInfo.classList.add('show');
            
            await uploadFile(file);
        }
        
        async function uploadFile(file) {
            uploadProgressDiv.classList.add('show');
            progressBarFill.style.width = '0%';
            progressPercent.textContent = '0';
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        progressBarFill.style.width = percent + '%';
                        progressPercent.textContent = percent;
                    }
                });
                
                const uploadPromise = new Promise((resolve, reject) => {
                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            const response = JSON.parse(xhr.responseText);
                            resolve(response);
                        } else {
                            let errorMsg = '上传失败';
                            try {
                                const error = JSON.parse(xhr.responseText);
                                errorMsg = error.error || error.details || '上传失败';
                            } catch(e) {}
                            reject(new Error(errorMsg));
                        }
                    };
                    xhr.onerror = () => reject(new Error('网络错误'));
                    xhr.onabort = () => reject(new Error('上传取消'));
                });
                
                xhr.open('POST', '/api/upload');
                xhr.send(formData);
                
                const response = await uploadPromise;
                fileUploadedUrl = response.url;
                
                showAlert('文件上传成功！', 'success');
            } catch (error) {
                console.error('上传失败:', error);
                showAlert('文件上传失败: ' + error.message, 'error');
                fileInfo.classList.remove('show');
                selectedFile = null;
            } finally {
                uploadProgressDiv.classList.remove('show');
            }
        }
        
        // 提交表单
        const submitForm = document.getElementById('submitForm');
        const submitBtn = document.getElementById('submitBtn');
        
        submitForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const gameVersion = document.getElementById('gameVersion').value;
            const i18nVersion = document.getElementById('i18nVersion').value.trim();
            const i18nTeam = document.getElementById('i18nTeam').value.trim();
            const authorName = document.getElementById('authorName').value.trim();
            
            if (!name || !gameVersion || !i18nVersion || !i18nTeam || !authorName) {
                showAlert('请填写所有必填项', 'error');
                return;
            }
            
            if (!selectedFile && !fileUploadedUrl) {
                showAlert('请上传汉化文件', 'error');
                return;
            }
            
            const submissionData = {
                name,
                original_name: document.getElementById('originalName').value.trim(),
                description: document.getElementById('description').value.trim(),
                game_version: gameVersion,
                i18n_version: i18nVersion,
                i18n_team: i18nTeam,
                author_name: authorName,
                author_email: document.getElementById('authorEmail').value.trim(),
                author_discord: document.getElementById('authorDiscord').value.trim(),
                curseforge_url: document.getElementById('curseforgeUrl').value.trim(),
                modrinth_url: document.getElementById('modrinthUrl').value.trim(),
                mcmod_url: document.getElementById('mcmodUrl').value.trim(),
                github_url: document.getElementById('githubUrl').value.trim(),
                bilibili_url: document.getElementById('bilibiliUrl').value.trim(),
                other_url: document.getElementById('otherUrl').value.trim(),
                image_url: document.getElementById('imageUrl').value.trim(),
                download_url: fileUploadedUrl,
                file_name: selectedFile ? selectedFile.name : '',
                file_size: selectedFile ? selectedFile.size : 0,
                tags: Array.from(selectedTags)
            };
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';
            
            try {
                const response = await fetch('/api/modpacks/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(submissionData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showAlert('提交成功！我们会尽快审核您的汉化包', 'success');
                    submitForm.reset();
                    selectedTags.clear();
                    document.querySelectorAll('.tag-option').forEach(t => t.classList.remove('selected'));
                    fileInfo.classList.remove('show');
                    fileUploadedUrl = null;
                    selectedFile = null;
                    
                    localStorage.setItem('lastAuthorName', authorName);
                    localStorage.setItem('lastAuthorEmail', document.getElementById('authorEmail').value.trim());
                    
                    setTimeout(() => {
                        window.location.href = '/my-submissions.html';
                    }, 3000);
                } else {
                    showAlert(result.error || '提交失败', 'error');
                }
            } catch (error) {
                console.error('提交失败:', error);
                showAlert('提交失败: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 提交汉化包';
            }
        });
        
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type} show`;
            alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${message}`;
            
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 5000);
        }
        
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }
        
        const lastAuthorName = localStorage.getItem('lastAuthorName');
        const lastAuthorEmail = localStorage.getItem('lastAuthorEmail');
        if (lastAuthorName) document.getElementById('authorName').value = lastAuthorName;
        if (lastAuthorEmail) document.getElementById('authorEmail').value = lastAuthorEmail;
    </script>
</body>
</html>
