<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的提交 - Modpack Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .submissions-header {
            text-align: center;
            padding: 48px 0 24px;
        }
        
        .submissions-header h1 {
            font-size: 32px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        
        .submissions-header p {
            color: var(--text-light);
        }
        
        /* 搜索框样式 */
        .search-box {
            max-width: 400px;
            margin: 24px auto 0;
            display: flex;
            gap: 12px;
        }
        
        .search-input {
            flex: 1;
            padding: 12px 20px;
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
        }
        
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-bg);
        }
        
        .search-btn {
            padding: 12px 24px;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-full);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .search-btn:hover {
            background: var(--primary-dark);
        }
        
        .name-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: center;
        }
        
        .refresh-btn {
            background: var(--bg-white);
            border: 1px solid var(--border);
            padding: 8px 20px;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
        }
        
        .refresh-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .submission-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            margin-bottom: 24px;
            overflow: hidden;
            transition: var(--transition);
        }
        
        .submission-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        
        .submission-header {
            padding: 20px 24px;
            background: var(--bg-light);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .submission-title {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .submission-title h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
        }
        
        .submission-title .original-name {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }
        
        .status-approved {
            background: #d1fae5;
            color: #059669;
        }
        
        .status-rejected {
            background: #fee2e2;
            color: #dc2626;
        }
        
        .submission-body {
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        
        .info-section {
            background: var(--bg-light);
            padding: 16px;
            border-radius: var(--radius-md);
        }
        
        .info-section h4 {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .info-item {
            margin-bottom: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 13px;
        }
        
        .info-label {
            color: var(--text-muted);
            min-width: 70px;
        }
        
        .info-value {
            color: var(--text-dark);
            word-break: break-all;
        }
        
        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }
        
        .tag {
            background: var(--bg-white);
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 11px;
            color: var(--primary);
            border: 1px solid var(--border);
        }
        
        .links-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .link-item {
            background: var(--bg-white);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 12px;
            color: var(--text-gray);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }
        
        .link-item:hover {
            background: var(--primary);
            color: white;
        }
        
        .admin-notes {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
            padding: 12px;
            margin-top: 12px;
            border-radius: var(--radius-sm);
        }
        
        .admin-notes p {
            font-size: 13px;
            color: #92400e;
        }
        
        .submission-footer {
            padding: 16px 24px;
            background: var(--bg-light);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }
        
        .empty-state i {
            font-size: 64px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        
        .loading-state, .error-state {
            text-align: center;
            padding: 80px 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .fa-spinner {
            animation: spin 1s linear infinite;
        }
        
        @media (max-width: 768px) {
            .submission-body {
                grid-template-columns: 1fr;
            }
            
            .submission-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .search-box {
                flex-direction: column;
                padding: 0 20px;
            }
            
            .search-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-inner">
                <a href="/" class="logo">
                    <div class="logo-icon">MH</div>
                    <div class="logo-text">Modpack <span>Hub</span></div>
                </a>
                <div class="nav-links">
                    <a href="/" class="nav-link">首页</a>
                    <a href="/modpacks.html" class="nav-link">整合包</a>
                    <a href="/disclaimer.html" class="nav-link">免责声明</a>
                    <a href="/submit.html" class="nav-link">提交汉化</a>
                    <a href="/my-submissions.html" class="nav-link active">我的提交</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div class="submissions-header">
            <h1><i class="fas fa-history"></i> 我的提交记录</h1>
            <p>输入您的昵称或邮箱，查看提交的汉化包及审核状态</p>
            
            <!-- 输入框搜索 -->
            <div class="search-box">
                <input type="text" id="authorNameInput" class="search-input" placeholder="请输入您的昵称或邮箱" value="">
                <button class="search-btn" onclick="searchSubmissions()">
                    <i class="fas fa-search"></i> 查询
                </button>
            </div>
            <div class="name-hint">
                <i class="fas fa-info-circle"></i> 使用提交汉化时填写的昵称或邮箱进行查询
            </div>
            
            <button class="refresh-btn" onclick="searchSubmissions()">
                <i class="fas fa-sync-alt"></i> 刷新
            </button>
        </div>
        
        <div id="submissionsList">
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <p>请输入昵称或邮箱开始查询</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="/">首页</a>
                <a href="/modpacks.html">整合包</a>
                <a href="/disclaimer.html">免责声明</a>
                <a href="/submit.html">提交汉化</a>
                <a href="/my-submissions.html">我的提交</a>
            </div>
            <p>© 2026 Modpack Hub · Minecraft 整合包汉化社区</p>
        </div>
    </footer>

    <script>
        let currentSubmissions = [];
        
        // 搜索提交记录
        async function searchSubmissions() {
            const inputValue = document.getElementById('authorNameInput').value.trim();
            
            if (!inputValue) {
                document.getElementById('submissionsList').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>请输入昵称或邮箱进行查询</p>
                    </div>
                `;
                return;
            }
            
            const submissionsList = document.getElementById('submissionsList');
            submissionsList.innerHTML = `
                <div class="loading-state">
                    <i class="fas fa-spinner"></i>
                    <p>正在查询提交记录...</p>
                </div>
            `;
            
            try {
                // 尝试作为邮箱查询，否则作为昵称查询
                let url = `/api/modpacks/submissions/my?`;
                if (inputValue.includes('@')) {
                    url += `author_email=${encodeURIComponent(inputValue)}`;
                } else {
                    url += `author_name=${encodeURIComponent(inputValue)}`;
                }
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('获取数据失败');
                }
                
                const submissions = await response.json();
                currentSubmissions = submissions;
                
                if (submissions.length === 0) {
                    submissionsList.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <p>没有找到 "${escapeHtml(inputValue)}" 的提交记录</p>
                            <p style="font-size: 14px; margin-top: 8px;">请检查昵称或邮箱是否正确</p>
                            <a href="/submit.html" class="btn-primary" style="margin-top: 20px; display: inline-block;">
                                <i class="fas fa-plus-circle"></i> 立即提交
                            </a>
                        </div>
                    `;
                    return;
                }
                
                // 保存最近查询的昵称
                localStorage.setItem('lastSearchedName', inputValue);
                
                submissionsList.innerHTML = submissions.map(sub => renderSubmissionCard(sub)).join('');
                
            } catch (error) {
                console.error('加载提交记录失败:', error);
                submissionsList.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>加载失败: ${error.message}</p>
                        <button class="refresh-btn" onclick="searchSubmissions()">
                            <i class="fas fa-sync-alt"></i> 重试
                        </button>
                    </div>
                `;
            }
        }
        
        // 回车键搜索
        document.getElementById('authorNameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchSubmissions();
            }
        });
        
        function getStatusBadge(status) {
            const statusMap = {
                'pending': { text: '审核中', class: 'status-pending', icon: 'fa-clock' },
                'approved': { text: '已通过', class: 'status-approved', icon: 'fa-check-circle' },
                'rejected': { text: '已拒绝', class: 'status-rejected', icon: 'fa-times-circle' }
            };
            const s = statusMap[status] || { text: status, class: 'status-pending', icon: 'fa-question-circle' };
            return `<span class="status-badge ${s.class}"><i class="fas ${s.icon}"></i> ${s.text}</span>`;
        }
        
        function formatDate(dateString) {
            if (!dateString) return '未知';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderSubmissionCard(sub) {
            const tags = sub.tags ? sub.tags.split(',').map(t => t.trim()) : [];
            const createdAt = formatDate(sub.created_at);
            const reviewedAt = sub.reviewed_at ? formatDate(sub.reviewed_at) : null;
            
            return `
                <div class="submission-card">
                    <div class="submission-header">
                        <div class="submission-title">
                            <h3>${escapeHtml(sub.name)}</h3>
                            ${sub.original_name ? `<span class="original-name">(${escapeHtml(sub.original_name)})</span>` : ''}
                            ${getStatusBadge(sub.status)}
                        </div>
                    </div>
                    
                    <div class="submission-body">
                        <div class="info-section">
                            <h4><i class="fas fa-info-circle"></i> 基本信息</h4>
                            <div class="info-item">
                                <span class="info-label">游戏版本:</span>
                                <span class="info-value">${escapeHtml(sub.game_version)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">汉化版本:</span>
                                <span class="info-value">${escapeHtml(sub.i18n_version)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">汉化组:</span>
                                <span class="info-value">${escapeHtml(sub.i18n_team)}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">作者:</span>
                                <span class="info-value">${escapeHtml(sub.author_name)}</span>
                            </div>
                            ${sub.description ? `
                            <div class="info-item">
                                <span class="info-label">描述:</span>
                                <span class="info-value">${escapeHtml(sub.description)}</span>
                            </div>
                            ` : ''}
                            ${tags.length > 0 ? `
                            <div class="info-item">
                                <span class="info-label">标签:</span>
                                <div class="tags-list">
                                    ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                                </div>
                            </div>
                            ` : ''}
                        </div>
                        
                        <div class="info-section">
                            <h4><i class="fas fa-link"></i> 相关链接</h4>
                            <div class="links-list">
                                ${sub.curseforge_url ? `<a href="${sub.curseforge_url}" target="_blank" class="link-item"><i class="fab fa-forumbee"></i> CurseForge</a>` : ''}
                                ${sub.modrinth_url ? `<a href="${sub.modrinth_url}" target="_blank" class="link-item"><i class="fas fa-cube"></i> Modrinth</a>` : ''}
                                ${sub.mcmod_url ? `<a href="${sub.mcmod_url}" target="_blank" class="link-item"><i class="fas fa-book"></i> MC百科</a>` : ''}
                                ${sub.github_url ? `<a href="${sub.github_url}" target="_blank" class="link-item"><i class="fab fa-github"></i> GitHub</a>` : ''}
                                ${sub.bilibili_url ? `<a href="${sub.bilibili_url}" target="_blank" class="link-item"><i class="fab fa-bilibili"></i> B站</a>` : ''}
                                ${sub.download_url ? `<a href="${sub.download_url}" target="_blank" class="link-item"><i class="fas fa-download"></i> 下载文件</a>` : ''}
                            </div>
                        </div>
                        
                        ${sub.admin_notes ? `
                        <div class="info-section">
                            <h4><i class="fas fa-comment-dots"></i> 管理员备注</h4>
                            <div class="admin-notes">
                                <p>${escapeHtml(sub.admin_notes)}</p>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="submission-footer">
                        <div>
                            <i class="fas fa-calendar-alt"></i> 提交时间: ${createdAt}
                        </div>
                        ${reviewedAt ? `
                        <div>
                            <i class="fas fa-user-check"></i> 审核时间: ${reviewedAt}
                            ${sub.reviewed_by ? `<span> | 审核人: ${escapeHtml(sub.reviewed_by)}</span>` : ''}
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        // 加载上次查询的昵称
        const lastSearched = localStorage.getItem('lastSearchedName');
        if (lastSearched) {
            document.getElementById('authorNameInput').value = lastSearched;
            // 自动查询
            searchSubmissions();
        }
    </script>
</body>
</html>
